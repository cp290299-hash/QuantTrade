<!DOCTYPE html><html><head><meta charset="UTF-8"><title>系統設定</title><style>body{background:#121214;color:#fff;font-family:sans-serif;padding:20px;}.card{background:#1e1e1e;padding:15px;border-radius:12px;margin-bottom:20px;}input,button{padding:8px;margin:5px;border-radius:20px;border:none;}button{background:#4caf50;color:white;}.btn{background:#2a2a35;padding:6px 14px;border-radius:20px;color:white;text-decoration:none;display:inline-block;}</style></head><body><h1>⚙️ 策略設定</h1><div><a href="/" class="btn">返回首頁</a></div><form method="POST"><div class="card"><h3>風險控制</h3><label>單筆最大虧損(%): <input type="number" step="0.5" name="max_loss_per_trade" value="{{ settings.max_loss_per_trade }}"></label><br><label>單一持股最大佔比(%): <input type="number" step="5" name="max_concentration" value="{{ settings.max_concentration }}"></label><br><label>現金餘額: <input type="number" step="1000" name="cash_balance" value="{{ settings.cash_balance }}"></label><br><label>均線糾結閾值(%): <input type="number" step="0.5" name="bonding_threshold" value="{{ settings.bonding_threshold }}"></label><br></div><div class="card"><h3>系統效能</h3><label>背景更新間隔(分鐘): <input type="number" name="background_update_minutes" value="{{ settings.background_update_minutes }}"></label><br><label>資料快取時間(分鐘): <input type="number" name="cache_ttl_minutes" value="{{ settings.cache_ttl_minutes }}"></label><br><label>觀察名單: <input type="text" name="watchlist" value="{{ watchlist }}" style="width:80%;"></label><br></div><button type="submit">儲存設定</button></form></body></html>
